name: Deploy Monorepo (Frontend + Backend)
env:
  VITE_API_URL: https://www.streamclips.in
  VITE_CLOUDFRONT_DOMAIN: www.streamclips.in
  VITE_ENVIRONMENT: production

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1 # Update if S3 is in a different region

      - name: Setup Node & Cache
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install and Build Client
        run: |
          cd client
          npm ci
          npm run build

      - name: Sync Frontend to S3
        run: aws s3 sync client/dist s3://${{ secrets.FRONTEND_S3_BUCKET }} --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLIENT_ASSETS_DIST_ID }} --paths "/*"

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1 # Update if EC2 is in a different region

      - name: Deploy via SSM & Wait for Result
        run: |
          # 1. Send the command and capture the Command ID
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying backend from GitHub Actions" \
            --parameters '{"commands":["sudo -u ssm-user bash -c \"cd /opt/video-app/VideoStreaming && git fetch origin && git reset --hard origin/main && cd server && npm ci\"","sudo systemctl restart video-api video-worker"]}' \
            --query 'Command.CommandId' \
            --output text)

          echo "Sent SSM Command: $COMMAND_ID. Waiting for execution..."

          # 2. Wait for the SSM agent to finish executing the script
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          # 3. Check if the script actually succeeded or failed
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'Status' \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deployment failed with status: $STATUS"
            echo "--- Server Error Logs ---"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'StandardErrorContent' \
              --output text
            exit 1
          fi

          echo "✅ Backend deployed successfully!"
